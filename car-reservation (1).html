<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Reservation - International Leadership of Texas</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --maroon: #7d1935;
            --maroon-dark: #5d1329;
            --maroon-light: #9d2449;
            --gold: #c9a961;
            --gold-dark: #b8954d;
            --cream: #faf7f2;
            --cream-dark: #f0ebe1;
            --sage: #7a9d7e;
            --terracotta: #c17951;
            --text: #2d1b1e;
            --text-light: #6b5853;
            --border: #e8dfd6;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 15% 20%, rgba(125, 25, 53, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(201, 169, 97, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header Styles */
        header {
            text-align: center;
            padding: 2rem 1rem 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        .logo-wrapper {
            margin-bottom: 1.5rem;
            animation: slideDown 0.6s ease-out;
        }

        .logo {
            width: 110px;
            height: auto;
            filter: drop-shadow(0 4px 20px rgba(125, 25, 53, 0.12));
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.75rem;
            font-weight: 800;
            color: var(--maroon);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .school-tag {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--gold-dark);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: var(--text-light);
            font-size: 1.05rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Main Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 480px 1fr;
            gap: 2.5rem;
            animation: fadeIn 1s ease-out 0.3s backwards;
        }

        /* Form Card */
        .booking-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 
                0 1px 3px rgba(125, 25, 53, 0.08),
                0 8px 32px rgba(125, 25, 53, 0.12);
            position: relative;
            overflow: hidden;
        }

        .booking-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--maroon) 0%, var(--gold) 100%);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--maroon);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 5px;
            height: 32px;
            background: var(--gold);
            border-radius: 3px;
        }

        /* Form Styles */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 1.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input, select {
            width: 100%;
            padding: 0.875rem 1.125rem;
            background: var(--cream);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'Work Sans', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--maroon);
            box-shadow: 0 0 0 4px rgba(125, 25, 53, 0.08);
            background: white;
        }

        input::placeholder {
            color: var(--text-light);
            opacity: 0.6;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='14' height='9' viewBox='0 0 14 9' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L7 7L13 1' stroke='%237d1935' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            padding-right: 3rem;
        }

        /* License Plate Display */
        .plate-display {
            background: linear-gradient(135deg, var(--maroon) 0%, var(--maroon-light) 100%);
            padding: 1.75rem;
            border-radius: 16px;
            text-align: center;
            margin: 1.5rem 0 2rem;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 
                0 4px 16px rgba(125, 25, 53, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .plate-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
        }

        .plate-display.available {
            background: linear-gradient(135deg, var(--sage) 0%, #6b9470 100%);
            box-shadow: 0 4px 16px rgba(122, 157, 126, 0.35);
        }

        .plate-display.not-available-preview {
            background: linear-gradient(135deg, var(--terracotta) 0%, #b36745 100%);
            box-shadow: 0 4px 16px rgba(193, 121, 81, 0.35);
        }

        .plate-display.checking {
            background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 100%);
            box-shadow: 0 4px 16px rgba(201, 169, 97, 0.35);
        }

        .plate-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        .plate-display.empty .plate-text {
            font-family: 'Work Sans', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.7;
            letter-spacing: 0.02em;
        }

        .availability-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            position: relative;
            z-index: 1;
            animation: fadeIn 0.3s ease-out;
        }

        .availability-badge .icon {
            font-size: 1.1rem;
        }

        .checking-animation {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1.125rem 2rem;
            background: linear-gradient(135deg, var(--maroon) 0%, var(--maroon-light) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            box-shadow: 0 4px 16px rgba(125, 25, 53, 0.3);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(125, 25, 53, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Reservations List */
        .reservations-panel {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 
                0 1px 3px rgba(125, 25, 53, 0.08),
                0 8px 32px rgba(125, 25, 53, 0.12);
            max-height: 800px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .reservations-list {
            overflow-y: auto;
            padding-right: 0.5rem;
            margin-top: 1rem;
        }

        .reservations-list::-webkit-scrollbar {
            width: 6px;
        }

        .reservations-list::-webkit-scrollbar-track {
            background: var(--cream);
            border-radius: 10px;
        }

        .reservations-list::-webkit-scrollbar-thumb {
            background: var(--maroon);
            border-radius: 10px;
        }

        /* Reservation Item */
        .reservation {
            background: var(--cream);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 5px solid var(--maroon);
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease-out;
        }

        .reservation:hover {
            transform: translateX(6px);
            box-shadow: 0 4px 20px rgba(125, 25, 53, 0.12);
        }

        .reservation.confirmed {
            border-left-color: var(--sage);
        }

        .reservation.not-available {
            border-left-color: var(--terracotta);
            opacity: 0.75;
        }

        .reservation-top {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .reservation-name {
            font-weight: 600;
            font-size: 1.125rem;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        .reservation-car {
            font-size: 0.9rem;
            color: var(--maroon-light);
            font-weight: 500;
        }

        .badge {
            padding: 0.4rem 0.875rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .badge.confirmed {
            background: rgba(122, 157, 126, 0.15);
            color: var(--sage);
        }

        .badge.not-available {
            background: rgba(193, 121, 81, 0.15);
            color: var(--terracotta);
        }

        .reservation-plate {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.125rem;
            color: var(--maroon);
            letter-spacing: 0.1em;
            margin: 0.75rem 0;
        }

        .reservation-dates {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .date-item {
            font-size: 0.85rem;
        }

        .date-label {
            color: var(--text-light);
            font-weight: 500;
            display: block;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
        }

        .date-value {
            color: var(--text);
            font-weight: 600;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            opacity: 0.2;
        }

        .empty-text {
            font-size: 1.05rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: white;
            padding: 1.25rem 1.75rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(125, 25, 53, 0.2);
            border-left: 5px solid var(--maroon);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1000;
            animation: slideInRight 0.4s ease-out;
            max-width: 450px;
        }

        .toast.success {
            border-left-color: var(--sage);
        }

        .toast.warning {
            border-left-color: var(--terracotta);
        }

        .toast-icon {
            font-size: 1.75rem;
            flex-shrink: 0;
        }

        .toast-message {
            color: var(--text);
            line-height: 1.5;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .content-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .booking-card,
            .reservations-panel {
                padding: 1.75rem;
            }

            .reservation-dates {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .logo {
                width: 90px;
            }
        }
    </style>
</head>

            const badge = document.getElementById('availabilityBadge');

            // If any required field is missing, don't check
            if (!carModel || !dateOfUse || !dateOfReturn || !dayOfRequest) {
                badge.innerHTML = '';
                return;
            }

            // Show checking state
            display.classList.remove('available', 'not-available-preview', 'empty');
            display.classList.add('checking');
            badge.innerHTML = '<div class="availability-badge"><span class="checking-animation"></span> Checking...</div>';

            // Simulate async check (in real app this would be API call)
            setTimeout(() => {
                const useDate = new Date(dateOfUse);
                const returnDate = new Date(dateOfReturn);
                const requestDate = new Date(dayOfRequest);

                const sameCarReservations = reservations.filter(r => r.carModel === carModel);
                let isAvailable = true;

                for (let reservation of sameCarReservations) {
                    const existingUse = new Date(reservation.dateOfUse);
                    const existingReturn = new Date(reservation.dateOfReturn);
                    const existingRequest = new Date(reservation.dayOfRequest);

                    const hasOverlap = useDate <= existingReturn && returnDate >= existingUse;

                    if (hasOverlap && requestDate >= existingRequest) {
                        isAvailable = false;
                        break;
                    }
                }

                display.classList.remove('checking');
                
                if (isAvailable) {
                    display.classList.add('available');
                    badge.innerHTML = '<div class="availability-badge"><span class="icon">✓</span> Available to Reserve</div>';
                } else {
                    display.classList.add('not-available-preview');
                    badge.innerHTML = '<div class="availability-badge"><span class="icon">✕</span> Not Available</div>';
                }
            }, 500);
        }

        // Update license plate display
        document.getElementById('carModel').addEventListener('change', function() {
            const display = document.getElementById('licensePlateDisplay');
            const plateText = display.querySelector('.plate-text');
            const selectedCar = this.value;
            
            if (selectedCar && licensePlates[selectedCar]) {
                plateText.textContent = licensePlates[selectedCar];
                display.classList.remove('empty');
                checkAvailability();
            } else {
                plateText.textContent = 'Select a vehicle to see license plate';
                display.classList.add('empty');
                display.classList.remove('available', 'not-available-preview', 'checking');
                document.getElementById('availabilityBadge').innerHTML = '';
            }
        });

        // Check availability when dates change
        document.getElementById('dateOfUse').addEventListener('change', checkAvailability);
        document.getElementById('dateOfReturn').addEventListener('change', checkAvailability);
        document.getElementById('dayOfRequest').addEventListener('change', checkAvailability);

        // Set date constraints
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dayOfRequest').value = today;
        document.getElementById('dayOfRequest').min = today;
        document.getElementById('dateOfUse').min = today;
        document.getElementById('dateOfReturn').min = today;

        document.getElementById('dateOfUse').addEventListener('change', function() {
            document.getElementById('dateOfReturn').min = this.value;
        });

        // Check for conflicts
        function checkConflict(carModel, dateOfUse, dateOfReturn, dayOfRequest) {
            const useDate = new Date(dateOfUse);
            const returnDate = new Date(dateOfReturn);
            const requestDate = new Date(dayOfRequest);

            const sameCarReservations = reservations.filter(r => r.carModel === carModel);

            for (let reservation of sameCarReservations) {
                const existingUse = new Date(reservation.dateOfUse);
                const existingReturn = new Date(reservation.dateOfReturn);
                const existingRequest = new Date(reservation.dayOfRequest);

                const hasOverlap = useDate <= existingReturn && returnDate >= existingUse;

                if (hasOverlap) {
                    if (requestDate > existingRequest) {
                        return { conflict: true, earlierReservation: reservation };
                    } else if (requestDate.getTime() === existingRequest.getTime()) {
                        return { conflict: true, earlierReservation: reservation };
                    }
                }
            }

            return { conflict: false };
        }

        // Show toast
        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '✓' : type === 'warning' ? '⚠' : '✕';
            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <span class="toast-message">${message}</span>
            `;
            
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 4500);
        }

        // Render reservations
        function renderReservations() {
            const container = document.getElementById('reservationsList');
            
            if (reservations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M5 17h14M5 17a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2M5 17v4m14-4v4"/>
                            <circle cx="12" cy="9" r="2"/>
                            <path d="M9 9h-.01M15 9h-.01"/>
                        </svg>
                        <p class="empty-text">No reservations yet. Book your first vehicle!</p>
                    </div>
                `;
                return;
            }

            const sorted = [...reservations].sort((a, b) => 
                new Date(a.dayOfRequest) - new Date(b.dayOfRequest)
            );

            container.innerHTML = sorted.map(r => `
                <div class="reservation ${r.status === 'confirmed' ? 'confirmed' : 'not-available'}">
                    <div class="reservation-top">
                        <div>
                            <div class="reservation-name">${r.requester}</div>
                            <div class="reservation-car">${r.carModel}</div>
                        </div>
                        <div class="badge ${r.status === 'confirmed' ? 'confirmed' : 'not-available'}">
                            ${r.status === 'confirmed' ? '✓' : '✕'} 
                            ${r.status === 'confirmed' ? 'Confirmed' : 'Not Available'}
                        </div>
                    </div>
                    <div class="reservation-plate">License: ${r.licensePlate}</div>
                    <div class="reservation-dates">
                        <div class="date-item">
                            <span class="date-label">Requested</span>
                            <span class="date-value">${new Date(r.dayOfRequest).toLocaleDateString()}</span>
                        </div>
                        <div class="date-item">
                            <span class="date-label">Use Date</span>
                            <span class="date-value">${new Date(r.dateOfUse).toLocaleDateString()}</span>
                        </div>
                        <div class="date-item">
                            <span class="date-label">Return Date</span>
                            <span class="date-value">${new Date(r.dateOfReturn).toLocaleDateString()}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Handle form submission
        document.getElementById('reservationForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = {
                requester: document.getElementById('requester').value,
                dayOfRequest: document.getElementById('dayOfRequest').value,
                dateOfUse: document.getElementById('dateOfUse').value,
                dateOfReturn: document.getElementById('dateOfReturn').value,
                carModel: document.getElementById('carModel').value,
                licensePlate: licensePlates[document.getElementById('carModel').value]
            };

            if (new Date(formData.dateOfReturn) < new Date(formData.dateOfUse)) {
                showToast('Return date must be after use date', 'error');
                return;
            }

            const conflictCheck = checkConflict(
                formData.carModel,
                formData.dateOfUse,
                formData.dateOfReturn,
                formData.dayOfRequest
            );

            let status = 'confirmed';
            let message = 'Reservation confirmed successfully!';
            let toastType = 'success';

            if (conflictCheck.conflict) {
                status = 'not-available';
                message = `Vehicle not available! ${conflictCheck.earlierReservation.requester} already reserved this vehicle for ${new Date(conflictCheck.earlierReservation.dateOfUse).toLocaleDateString()} - ${new Date(conflictCheck.earlierReservation.dateOfReturn).toLocaleDateString()}.`;
                toastType = 'warning';
            }

            formData.status = status;
            reservations.push(formData);

            showToast(message, toastType);
            renderReservations();

            this.reset();
            document.getElementById('dayOfRequest').value = today;
            const display = document.getElementById('licensePlateDisplay');
            display.querySelector('.plate-text').textContent = 'Select a vehicle to see license plate';
            display.classList.add('empty');
            display.classList.remove('available', 'not-available-preview', 'checking');
            document.getElementById('availabilityBadge').innerHTML = '';
        });

        renderReservations();
    </script>
</body>
</html>
